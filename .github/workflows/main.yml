name: Fetch new feeds and push content to Github Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'feeds.php'
      - 'base.html'
  schedule:
    - cron: '0 */24 * * *'  # Note: This cron syntax runs every 24 hours, not 2 hours. Use '0 */2 * * *' for every 2 hours.
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Run feeds.php
        run: php feeds.php
      
      - name: Commit files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add --all
          git commit -m "Updating the repository" || echo "No changes to commit"
      
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force: true
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # --- NEW STEP: Send Email Notification ---
      - name: Send Email Notification
        #if: always() # Sends email even if the deployment fails. Remove this line to only send on success.
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: GitHub Pages Feed Update - ${{ job.status }}
          body: |
            The feed update workflow has completed.
            
            Status: ${{ job.status }}
            Repository: ${{ github.repository }}
            Run ID: ${{ github.run_id }}
            URL: ${{ steps.deployment.outputs.page_url }}
          to: ${{ secrets.GMAIL_RECIPIENT }}
          from: GitHub Actions Bot

